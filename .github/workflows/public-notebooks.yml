name: public-notebooks

on:
  pull_request:
    paths:
      - "notebooks/**"
      - "reproduce/**"
      - "manage_db/public_notebooks.py"
      - "scripts/*public_notebooks.py"
      - "tests/test_public_notebooks.py"
      - "tests/test_notebook_structure.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/public-notebooks.yml"
      - ".gitmodules"
      - ".claude/worktrees/**"
      - ".worktrees/**"
  push:
    branches: [main]
    paths:
      - "notebooks/**"
      - "reproduce/**"
      - "manage_db/public_notebooks.py"
      - "scripts/*public_notebooks.py"
      - "tests/test_public_notebooks.py"
      - "tests/test_notebook_structure.py"
      - ".github/workflows/public-notebooks.yml"
      - ".gitmodules"
      - ".claude/worktrees/**"
      - ".worktrees/**"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject unconfigured worktree gitlinks
        shell: bash
        run: |
          bad=0
          while IFS= read -r -d '' entry; do
            metadata=${entry%%$'\t'*}
            path=${entry#*$'\t'}
            [[ ${metadata%% *} == 160000 ]] || continue
            [[ $path == .claude/worktrees/* || $path == .worktrees/* ]] || continue

            configured=0
            if [[ -f .gitmodules ]]; then
              while IFS= read -r key; do
                configured_path=$(git config -f .gitmodules --get "$key" || true)
                [[ $configured_path == "$path" ]] || continue
                section=${key%.path}
                url=$(git config -f .gitmodules --get "$section.url" || true)
                if [[ -n ${url//[[:space:]]/} ]]; then
                  configured=1
                fi
              done < <(git config -f .gitmodules --name-only --get-regexp '^submodule\..*\.path$' || true)
            fi

            if (( configured == 0 )); then
              echo "::error file=$path::worktree gitlink has no configured non-empty submodule URL"
              bad=1
            fi
          done < <(git ls-files --stage -z)
          exit "$bad"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --frozen --group dev --group notebooks --group gnn
      - run: uv run pytest -q tests/test_public_notebooks.py tests/test_notebook_structure.py
      - run: uv run python scripts/build_public_notebooks.py
      - run: git diff --exit-code -- notebooks
      - run: uv run python scripts/check_public_notebooks.py --execute
